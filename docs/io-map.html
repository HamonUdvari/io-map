  <script id="6" type="module" pinned>
    import {tile as d3tile, tileWrap} from "npm:d3-tile";

    const width = 928;
    const height = 500;

    const svg = d3.create("svg")
        .attr("viewBox", [0, 0, width, height]);

    const tile = d3tile()
        .extent([[0, 0], [width, height]])
        .tileSize(256)
        .clampX(false);

    const zoom = d3.zoom()
        .scaleExtent([1 << 17, 1 << 27])
        .extent([[0, 0], [width, height]])
        .on("zoom", ({transform}) => zoomed(transform));

    let image = svg.append("g")
        .attr("pointer-events", "none")
        .selectAll("image");

    // --- START GENEVA INITIALIZATION ---
    const geneva = [6.1432, 46.2044];
    const initialScale = 1 << 20; // High zoom for city level

    const projection = d3.geoMercator()
      .scale(1 / (2 * Math.PI))
      .translate([0, 0]);

    const [x0, y0] = projection([currentMap.minLon, currentMap.maxLat]); // upper-left
    const [x1, y1] = projection([currentMap.maxLon, currentMap.minLat]); // lower-right
    let oldMapImage = svg.append("image")
       .attr("xlink:href", currentMap.src)
       .attr("x", x0)
       .attr("y", y0)
       .attr("width", x1 - x0)
       .attr("height", y1 - y0);

    if (zoomState.transform === d3.zoomIdentity) {
      const [gx, gy] = projection(geneva);

      zoomState.transform = d3.zoomIdentity
        .translate(width / 2, height / 2)
        .scale(initialScale)
        .translate(-gx, -gy);
    }

    svg.append("g")
      .attr("fill", "brown")
      .attr("fill-opacity", 0.5)
      .attr("stroke", "#fff")
      .attr("stroke-width", 0.5)
      .selectAll()
      .data(filteredGeoDataByYear)
      .join("circle")
      .attr("cx", d => projection([d.long, d.lat])[0])
      .attr("cy", d => projection([d.long, d.lat])[1])
      .attr("r", d => 5)
      .attr("fill", d => d.type === "NGO" ? "red" : "blue")
      .append("title")
      .text(d => d.nameEn);

    svg
      .call(zoom)
      .call(zoom.transform, zoomState.transform);

    function zoomed(transform) {
      zoomState.transform = transform;
      const tiles = tile(transform);

      image = image.data(tiles, d => d).join("image")
          .attr("xlink:href", d => url(...tileWrap(d)))
          .attr("x", ([x]) => (x + tiles.translate[0]) * tiles.scale)
          .attr("y", ([, y]) => (y + tiles.translate[1]) * tiles.scale)
          .attr("width", tiles.scale)
          .attr("height", tiles.scale);

      oldMapImage
        .attr("transform", `translate(${transform.x}, ${transform.y}) scale(${transform.k})`)
        .attr("opacity", mapOpacity);

      svg.selectAll("circle")
        .attr("cx", d => transform.applyX(projection([d.long, d.lat])[0]))
        .attr("cy", d => transform.applyY(projection([d.long, d.lat])[1]));
    }

    display(svg.node());
  </script>
  <script id="7" type="text/markdown">
    ## Data

    The raw data is loaded in from Google Sheets for convenience, although it can be any CSV file.

    The data should all be inside a single spreadsheet, so that we can use code to later filter it. For the Proof Of Concept (POC) I have concatenated all the data sources that seemed the most complete from what we have received.

    The initial address data is merged latitude longitude data, which is obtained by a process called geocoding; note that some addresses were not successfully geocoded and are simply ignored in the POC.

    Notes
    * To handle different data types such as `NGO` or `Permanent Mission` we should simply add new columns for this information
    * Type specific information like `currentStateName` or `previousStateName` can be left empty for datums (data points) where it is not applicable
    * Filtering the data here through Observable Plot will affect subsequent visualisations
  </script>

  <script id="25" type="module" pinned>
    // Table of contents, ported from https://observablehq.com/@mbostock/toc
    function toc(selector = "h1,h2,h3") {
      return Generators.observe((notify) => {
        let headings = [];

        function observed() {
          const h = Array.from(document.querySelectorAll(selector));
          if (h.length !== headings.length || h.some((h, i) => headings[i] !== h)) {
            notify(html`<b>Table of Contents</b><ul>${Array.from((headings = h), (h) =>
              Object.assign(
                html`<li><a href="#${h.id}">${h.textContent}</a></li>`,
                {onclick: (e) => (e.preventDefault(), h.scrollIntoView())}
              )
            )}</ul>`);
          }
        }

        const observer = new MutationObserver(observed);
        observer.observe(document.body, {childList: true, subtree: true});
        observed();
        return () => observer.disconnect();
      });
    }
  </script>
  <script id="26" type="text/markdown">
    ### Georeferencing (Aligning images onto the map)
    1. Plugins - Manage and Install Plugins and install Quick Map Services
    1. Add a basemap via Web - Quick Map Services – OSM – OSM Standard
    1. Optionally install OSM Place Search Plugin
    1. Layer - Georeferencer
      1. Open Raster
      2. Add GCP (Ground Control Points), at least 3 for tests, 10 for good results
      3. Adjust transformation settings: 3857 - WGS 84 Pseudo Mercator, transformation type: polynomial 1, use 0 for transparency when needed

    [Reference tutorial](https://www.youtube.com/watch?v=XV62QEk0Cxg)

    ### CLI commands
    Convert and downsize GeoTIF to PNG
    ```sh
    gdal_translate -of PNG -outsize 4000 0 1943_modified.tif 1943_modified_4000.png
    ```

    Get GeoTIF wgs84Extent data
    ```
    gdalinfo -json 1943_modified.tif | jq '.wgs84Extent.coordinates[0] | {minLon: .[0][0], maxLon: .[2][0], minLat: .[1][1], maxLat: .[0][1]}'
    ```
