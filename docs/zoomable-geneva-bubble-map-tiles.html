<!doctype html>
<notebook theme="air">
  <title>Zoomable Geneva Bubble Map Tiles</title>
  <script id="1" type="text/markdown">
    # Zoomable Geneva Bubble Map Tiles
  </script>
  <script id="2" type="module" pinned>
    const genevaData = FileAttachment("data/gva-test-data.geojson").json();
  </script>
  <script id="3" type="module" pinned>
    const options = new Map([
      ["CartoDB Voyager", (x, y, z) => `https://${"abc"[Math.abs(x + y) % 3]}.basemaps.cartocdn.com/rastertiles/voyager/${z}/${x}/${y}${devicePixelRatio > 1 ? "@2x" : ""}.png`],
      ["Stamen Terrain", (x, y, z) => `https://tiles.stadiamaps.com/tiles/stamen_terrain/${z}/${x}/${y}${devicePixelRatio > 1 ? "@2x" : ""}.png`],
      ["Stamen Toner", (x, y, z) => `https://tiles.stadiamaps.com/tiles/stamen_toner/${z}/${x}/${y}${devicePixelRatio > 1 ? "@2x" : ""}.png`],
      ["Stamen Toner (lite)", (x, y, z) => `https://tiles.stadiamaps.com/tiles/stamen_toner_lite/${z}/${x}/${y}${devicePixelRatio > 1 ? "@2x" : ""}.png`],
      ["Stamen Watercolor", (x, y, z) => `https://tiles.stadiamaps.com/tiles/stamen_watercolor/${z}/${x}/${y}.jpg`],
      ["OSM Mapnik", (x, y, z) => `https://${"abc"[Math.abs(x + y) % 3]}.tile.osm.org/${z}/${x}/${y}.png`],
      ["Wikimedia Maps", (x, y, z) => `https://maps.wikimedia.org/osm-intl/${z}/${x}/${y}.png`]
    ]);

    const url = view(Inputs.select(options, {value: options.get("OSM Mapnik")}));
  </script>
  <script id="4" type="module" pinned>
    import {tile as d3tile, tileWrap} from "npm:d3-tile";

    {
      const bubbleData = genevaData.features.map(({properties, geometry}) => ({...properties, x: geometry.coordinates[0], y: geometry.coordinates[1]}));

      const width = 928;
      const height = 500;

      const svg = d3.create("svg")
          .attr("viewBox", [0, 0, width, height]);

      const tile = d3tile()
          .extent([[0, 0], [width, height]])
          .tileSize(256)
          .clampX(false);

      const zoom = d3.zoom()
          .scaleExtent([1 << 17, 1 << 27])
          .extent([[0, 0], [width, height]])
          .on("zoom", ({transform}) => zoomed(transform));

      let image = svg.append("g")
          .attr("pointer-events", "none")
          .selectAll("image");

      // --- START GENEVA INITIALIZATION ---
      const geneva = [6.1432, 46.2044];
      const initialScale = 1 << 20; // High zoom for city level

      const projection = d3.geoMercator()
        .scale(1 / (2 * Math.PI))
        .translate([0, 0]);

      const [gx, gy] = projection(geneva);

      svg.append("g")
        .attr("fill", "brown")
        .attr("fill-opacity", 0.5)
        .attr("stroke", "#fff")
        .attr("stroke-width", 0.5)
        .selectAll()
        .data(bubbleData)
        .join("circle")
        .attr("cx", d => projection([d.x, d.y])[0])
        .attr("cy", d => projection([d.x, d.y])[1])
        .attr("r", d => 10)
        .append("title")
        .text(d => d.name);

      svg
        .call(zoom)
        .call(zoom.transform, d3.zoomIdentity
          .translate(width / 2, height / 2)
          .scale(initialScale)
          .translate(-gx, -gy));

      function zoomed(transform) {
        const tiles = tile(transform);

        image = image.data(tiles, d => d).join("image")
            .attr("xlink:href", d => url(...tileWrap(d)))
            .attr("x", ([x]) => (x + tiles.translate[0]) * tiles.scale)
            .attr("y", ([, y]) => (y + tiles.translate[1]) * tiles.scale)
            .attr("width", tiles.scale)
            .attr("height", tiles.scale);

        svg.selectAll("circle")
          .attr("cx", d => transform.applyX(projection([d.x, d.y])[0]))
          .attr("cy", d => transform.applyY(projection([d.x, d.y])[1]));
      }

      display(svg.node());
    }
  </script>
</notebook>
