<!doctype html>
<notebook theme="air">
  <title>Zoomable Geneva Historical Basemaps</title>
  <script id="1" type="text/markdown">
    # Zoomable Geneva Historical Basemaps

    v2 demo: the basemap itself time-travels. [swisstopo](https://www.swisstopo.admin.ch) serves several [Journey through time](https://www.geo.admin.ch/en/maps-data-and-applications/maps-of-switzerland/journey-through-time) WMTS layers; pick one and drag the year slider — pan and zoom are preserved:

    - **Map editions (Zeitreise)** — the national map series from 1844 (Dufour, then Siegfried, then the modern Landeskarte)
    - **National map 1:25,000** — the crisp, near-monochrome LK25 editions (Geneva sheet from 1956)
    - **Aerial imagery (SWISSIMAGE)** — photo mosaics of Geneva from 1932, black & white until the late 1990s

    The **Black & white** toggle applies a grayscale filter to any layer, for a consistent monochrome look across epochs (a native historical B/W map layer does not exist — checked the WMTS capabilities).

    Tiles © [swisstopo](https://www.swisstopo.admin.ch). Coverage is Swiss territory only, and per-year coverage varies by region; the year lists below are pre-filtered to years with actual content at Geneva (`make swisstopo-layers`, `make zeitreise-editions`).
  </script>
  <script id="7" type="module" pinned>
    // Years in which the Zeitreise map around Geneva actually changed, detected by hashing
    // sample tiles across all TIME values (`make zeitreise-editions`).
    const editions = FileAttachment("data/zeitreise-editions.json").json();
  </script>
  <script id="10" type="module" pinned>
    // Per-layer timestamps with verified Geneva coverage (`make swisstopo-layers`).
    const layersData = FileAttachment("data/swisstopo-layers.json").json();
  </script>
  <script id="11" type="module" pinned>
    const layerOptions = new Map([
      ["Map editions — Zeitreise (1844–2021)", {
        id: "ch.swisstopo.zeitreihen", ext: "png", times: editions, time: y => `${y}1231`, maxZoom: 18
      }],
      ["National map 1:25,000 (1956–)", {
        id: "ch.swisstopo.pixelkarte-farbe-pk25.noscale", time: y => `${y}`, maxZoom: 18,
        ...layersData["ch.swisstopo.pixelkarte-farbe-pk25.noscale"]
      }],
      ["Aerial imagery — SWISSIMAGE (1932–)", {
        id: "ch.swisstopo.swissimage-product", time: y => `${y}`, maxZoom: 20,
        ...layersData["ch.swisstopo.swissimage-product"]
      }]
    ]);

    const layer = view(Inputs.select(layerOptions, {label: "Layer"}));
  </script>
  <script id="2" type="module" pinned>
    const year = view(Inputs.range([1844, 2025], {value: 1920, step: 1, label: "Year"}));
  </script>
  <script id="12" type="module" pinned>
    const bw = view(Inputs.toggle({label: "Black & white"}));
  </script>
  <script id="8" type="module" pinned>
    // Snap to the latest year with content at or before the slider year.
    const shownYear = layer.times.findLast(t => t <= year) ?? layer.times[0];
  </script>
  <script id="9" type="text/markdown">
    Shown: **${shownYear}**${layer.times[layer.times.indexOf(shownYear) + 1] ? ` — next ${layer.id === "ch.swisstopo.swissimage-product" ? "imagery" : "revision"}: ${layer.times[layer.times.indexOf(shownYear) + 1]}` : ""} (${layer.times.length} years available for this layer around Geneva).
  </script>
  <script id="3" type="module" pinned>
    // TIME snaps to shownYear, so tile URLs only change when the content actually does —
    // intermediate slider years are served from the browser cache.
    const url = (x, y, z) => `https://wmts.geo.admin.ch/1.0.0/${layer.id}/default/${layer.time(shownYear)}/3857/${z}/${x}/${y}.${layer.ext}`;
  </script>
  <script id="4" type="module" pinned>
    // Persists the map's pan/zoom across cell re-runs (the map cell re-runs on every change).
    const zoomState = {transform: d3.zoomIdentity};
  </script>
  <script id="5" type="module" pinned>
    import {tile as d3tile, tileWrap} from "npm:d3-tile";

    {
      const width = 928;
      const height = 500;

      const svg = d3.create("svg")
          .attr("viewBox", [0, 0, width, height]);

      const tile = d3tile()
          .extent([[0, 0], [width, height]])
          .tileSize(256)
          .clampX(false);

      const zoom = d3.zoom()
          .scaleExtent([1 << 17, 1 << (8 + layer.maxZoom)]) // the layer's tile matrix ends at maxZoom (256 · 2^z)
          .extent([[0, 0], [width, height]])
          .on("zoom", ({transform}) => zoomed(transform));

      let image = svg.append("g")
          .attr("pointer-events", "none")
          .style("filter", bw ? "grayscale(1)" : null)
          .selectAll("image");

      // --- START GENEVA INITIALIZATION ---
      const geneva = [6.1432, 46.2044];
      const initialScale = 1 << 20; // High zoom for city level

      const projection = d3.geoMercator()
        .scale(1 / (2 * Math.PI))
        .translate([0, 0]);

      if (zoomState.transform === d3.zoomIdentity) {
        const [gx, gy] = projection(geneva);

        zoomState.transform = d3.zoomIdentity
          .translate(width / 2, height / 2)
          .scale(initialScale)
          .translate(-gx, -gy);
      }
      // --- END GENEVA INITIALIZATION ---

      svg
        .call(zoom)
        .call(zoom.transform, zoomState.transform);

      function zoomed(transform) {
        zoomState.transform = transform;
        const tiles = tile(transform);

        image = image.data(tiles, d => d).join("image")
            .attr("xlink:href", d => url(...tileWrap(d)))
            .attr("x", ([x]) => (x + tiles.translate[0]) * tiles.scale)
            .attr("y", ([, y]) => (y + tiles.translate[1]) * tiles.scale)
            .attr("width", tiles.scale)
            .attr("height", tiles.scale);
      }

      display(svg.node());
    }
  </script>
  <script id="6" type="text/markdown">
    Compared to the scanned-overlay approach (see [io-map v2](./io-map-v2)): no georeferencing work, no seams, citywide-to-national coverage at every zoom level, and a cartographically consistent style within each edition. The candidate role for these layers is the time-driven basemap under the organisation points, with our georeferenced city plans kept as optional detail overlays.
  </script>
